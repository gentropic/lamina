<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- maskable icon: dark plate + glyph pulled into the safe zone (inner ~60%) so
       Android/adaptive masks (circle/squircle) never clip it -->
  <rect width="512" height="512" rx="96" fill="#121212"/>
  <rect x="128" y="140" width="256" height="60" fill="#d97a3c"/>
  <rect x="128" y="220" width="72" height="152" fill="#8a9099"/>
  <rect x="220" y="220" width="72" height="152" fill="#8a9099"/>
  <rect x="312" y="220" width="72" height="152" fill="#8a9099"/>
</svg>
