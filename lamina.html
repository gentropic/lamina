<!DOCTYPE html>
<!-- lamina — a windowed, read-only viewer for arbitrarily huge files (standalone dev app) -->
<!-- Part of the Auditable project — https://github.com/gentropic/auditable -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lamina</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='96' fill='%23121212'/%3E%3Crect x='96' y='150' width='320' height='40' rx='6' fill='%238a9099'/%3E%3Crect x='96' y='236' width='320' height='40' rx='6' fill='%23c89b3c'/%3E%3Crect x='96' y='322' width='320' height='40' rx='6' fill='%238a9099'/%3E%3C/svg%3E">
<meta name="theme-color" content="#121212">
<style>
  :root { --mono: 'Space Mono', ui-monospace, monospace; --sans: 'Barlow', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #121212; color: #bbb; font-family: var(--sans); overflow: hidden; }
  #toolbar {
    position: absolute; left: 0; right: 0; top: 0; height: 38px; display: flex; align-items: center;
    gap: 8px; padding: 0 10px; border-bottom: 1px solid #2a2a2a; background: #1a1a1a;
  }
  #toolbar .title { font-family: var(--mono); font-size: 13px; color: #c89b3c; }
  #toolbar button {
    font-family: var(--mono); font-size: 12px; color: #bbb; background: #242424;
    border: 1px solid #333; border-radius: 3px; padding: 4px 10px; cursor: pointer;
  }
  #toolbar button:hover { background: #2e2e2e; border-color: #444; }
  #toolbar .mb { background: transparent; border-color: transparent; padding: 4px 9px; }
  #toolbar .mb:hover { background: #2a2a2a; border-color: #333; }
  #toolbar .spacer { flex: 1; }
  #toolbar #filterWrap { flex: 1; min-width: 120px; position: relative; display: flex; }
  #toolbar #filter {
    flex: 1; min-width: 0; font-family: var(--mono); font-size: 12px; color: #ddd;
    background: #141414; border: 1px solid #333; border-radius: 3px; padding: 4px 24px 4px 8px;
  }
  #toolbar #filter:focus { outline: none; border-color: #4a78b0; }   /* info */
  #toolbar #filter.err { border-color: #c0584a; }                    /* fault */
  #toolbar #filter::placeholder { color: #555; }
  #toolbar #filterClear {
    position: absolute; right: 1px; top: 1px; bottom: 1px; width: 22px; padding: 0;
    background: transparent; border: none; color: #777; font-size: 15px; line-height: 1; cursor: pointer; display: none;
  }
  #toolbar #filterClear:hover { color: #ddd; }
  #toolbar #filterWrap.has #filterClear { display: block; }
  #toolbar #goto {
    width: 64px; font-family: var(--mono); font-size: 12px; color: #ddd; background: #141414;
    border: 1px solid #333; border-radius: 3px; padding: 4px 6px;
  }
  #toolbar #goto:focus { outline: none; border-color: #4a78b0; }
  #toolbar #goto::placeholder { color: #555; }
  #toolbar .name { font-family: var(--mono); font-size: 12px; color: #888; }
  #toolbar .kind { font-family: var(--mono); font-size: 11px; color: #8cb878; border: 1px solid #2f4a28; border-radius: 3px; padding: 1px 6px; cursor: pointer; }
  #toolbar .kind:hover { border-color: #8cb878; }

  #opts {
    position: absolute; top: 40px; right: 10px; z-index: 30; display: none; flex-direction: column; gap: 8px;
    background: #1c1c1c; border: 1px solid #333; border-radius: 6px; padding: 12px 14px;
    font-family: var(--mono); font-size: 12px; color: #bbb; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  #opts.show { display: flex; }
  #opts label { display: flex; justify-content: space-between; align-items: center; gap: 14px; }
  #opts select, #opts input { font-family: var(--mono); font-size: 12px; color: #ddd; background: #141414; border: 1px solid #333; border-radius: 3px; padding: 3px 6px; }
  #opts input { width: 72px; }
  #opts input:focus, #opts select:focus { outline: none; border-color: #4a78b0; }

  .ctxmenu {
    position: fixed; z-index: 40; min-width: 160px; background: #1c1c1c; border: 1px solid #333;
    border-radius: 6px; padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); font-family: var(--mono); font-size: 12px;
  }
  .ctxmenu .item { display: flex; justify-content: space-between; gap: 16px; padding: 5px 10px; border-radius: 3px; color: #ccc; cursor: pointer; white-space: nowrap; }
  .ctxmenu .item:hover { background: #2e2e2e; }
  .ctxmenu .item .arr { color: #777; }
  .ctxmenu .sep { height: 1px; background: #2f2f2f; margin: 4px 6px; }
  #help .help-body .sfilter { color: #ddd; cursor: pointer; border-bottom: 1px dotted #555; padding: 0 3px; border-radius: 3px; }
  #help .help-body .sfilter:hover { color: #c89b3c; border-bottom-color: #c89b3c; }
  #help .help-body .sfilter.sel { background: rgba(200,155,60,0.18); color: #c89b3c; border-bottom-color: transparent; }

  #help { position: absolute; inset: 38px 0 24px 0; z-index: 35; display: none; align-items: center; justify-content: center; background: rgba(10,10,10,0.7); }
  #help.show { display: flex; }
  #help .help-box { width: min(620px, 84vw); max-height: 78%; display: flex; flex-direction: column; background: #1c1c1c; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
  #help .help-head { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; border-bottom: 1px solid #2a2a2a; font-family: var(--mono); font-size: 13px; color: #c89b3c; }
  #help .help-head button { background: none; border: none; color: #888; font-size: 18px; line-height: 1; cursor: pointer; padding: 0 4px; }
  #help .help-head button:hover { color: #ddd; }
  #help .help-body { overflow-y: auto; padding: 14px 16px; font-family: var(--mono); font-size: 12px; color: #bbb; line-height: 1.7; }
  #help .help-body code { color: #c89b3c; }
  #help .help-body b { color: #ddd; font-weight: 600; }

  #grid { position: absolute; left: 0; right: 0; top: 38px; bottom: 24px; }
  #empty, #binary {
    position: absolute; inset: 38px 0 24px 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px; color: #555; font-family: var(--mono);
    font-size: 13px; text-align: center;
  }
  #empty b, #binary b { color: #888; }
  #binary { display: none; color: #888; }
  #empty { pointer-events: none; }

  footer {
    position: absolute; left: 0; right: 0; bottom: 0; height: 24px; display: flex; align-items: center;
    gap: 16px; padding: 0 12px; border-top: 1px solid #2a2a2a; background: #161616;
    font-family: var(--mono); font-size: 11px; color: #777;
  }
  #drop-hint {
    position: absolute; inset: 38px 6px 30px 6px; border: 2px dashed #c89b3c; border-radius: 6px;
    background: rgba(200,155,60,0.06); display: none; align-items: center; justify-content: center;
    color: #c89b3c; font-family: var(--mono); font-size: 14px; pointer-events: none; z-index: 10;
  }
  body.dragging #drop-hint { display: flex; }

  #picker { position: absolute; inset: 38px 0 24px 0; display: none; align-items: center; justify-content: center;
    background: rgba(10,10,10,0.7); z-index: 20; }
  #picker.show { display: flex; }
  #picker .pk-box { width: min(560px, 80vw); max-height: 70%; display: flex; flex-direction: column;
    background: #1c1c1c; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
  #picker .pk-title { font-family: var(--mono); font-size: 12px; color: #c89b3c; padding: 10px 12px; border-bottom: 1px solid #2a2a2a; }
  #picker .pk-list { overflow-y: auto; }
  #picker .pk-item { display: flex; justify-content: space-between; gap: 12px; padding: 8px 12px; cursor: pointer;
    font-family: var(--mono); font-size: 12px; color: #bbb; border-bottom: 1px solid #222; }
  #picker .pk-item:hover { background: #262626; }
  #picker .pk-item .pk-size { color: #777; }
</style>
<!-- Standalone @gcu/* resolution (a single-file build inlines these later). -->
</head>
<body>
  <div id="toolbar">
    <span class="title">lamina</span>
    <button class="mb" id="mFile">File</button>
    <button class="mb" id="mView">View</button>
    <button class="mb" id="mHelp">Help</button>
    <span id="filterWrap"><input id="filter" type="text" spellcheck="false" placeholder="filter…  e.g.  grade > 1  &&  lito == OXIDE"><button id="filterClear" title="clear filter (Esc)" tabindex="-1">×</button></span>
    <input id="goto" type="number" min="1" placeholder="row #" title="go to row">
    <span class="name" id="fileName">no file</span>
    <span class="kind" id="kindBadge" style="display:none" title="click to change how this file is read"></span>
  </div>

  <div id="help"><div class="help-box">
    <div class="help-head"><span id="helpTitle">help</span><button id="helpClose">×</button></div>
    <div class="help-body" id="helpBody"></div>
  </div></div>

  <div id="opts">
    <label>View as <select id="optKind"><option value="">auto</option><option value="delimited">table</option><option value="text">text</option></select></label>
    <label>Delimiter <select id="optDelim"><option value="">auto</option><option value=",">comma</option><option value=";">semicolon</option><option value="&#9;">tab</option><option value="|">pipe</option><option value=" ">whitespace</option></select></label>
    <label>Header <select id="optHeader"><option value="">auto</option><option value="yes">yes</option><option value="no">no</option></select></label>
    <label>Skip rows <input id="optSkip" type="number" min="0" placeholder="auto"></label>
    <label>Comment <input id="optComment" type="text" maxlength="2" placeholder="#"></label>
  </div>

  <div id="grid"></div>
  <div id="empty"><b>open any file</b><span>Open… · or drag a file anywhere — CSV/TSV → table, text → lines, .zip/.tar/.gz/.zst/.xz/.bz2 → peek inside</span></div>
  <div id="binary"><b>binary file</b><span id="binaryMsg">use the hex viewer for this one</span></div>
  <div id="drop-hint">drop to open</div>
  <div id="picker"><div class="pk-box"><div class="pk-title">choose a file from the archive</div><div class="pk-list" id="pickerList"></div></div></div>

  <footer><span id="meta">—</span></footer>
